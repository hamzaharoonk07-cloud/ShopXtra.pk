<title>Contact — ShopXtra</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="robots" content="index, follow">
<meta name="description" content="Get in touch with ShopXtra — questions about orders, products or delivery across Pakistan.">
<link rel="canonical" href="https://shop-xtra-pk.vercel.app/pages/contact.html">
<meta property="og:type" content="website">
<meta property="og:site_name" content="ShopXtra">
<meta property="og:title" content="Contact — ShopXtra">
<meta property="og:description" content="Get in touch with ShopXtra — questions about orders, products or delivery across Pakistan.">
<meta property="og:url" content="https://shop-xtra-pk.vercel.app/pages/contact.html">
<meta property="og:image" content="https://shop-xtra-pk.vercel.app/assets/logo-full.png">
<meta name="twitter:card" content="summary_large_image">
<link rel="icon" type="image/png" href="/assets/favicon.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@500;600;700;800&family=Hanken+Grotesk:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<link href="/css/vendor/bootstrap.min.css" rel="stylesheet">
<link href="/css/style.css" rel="stylesheet">

<div id="navbar-slot"></div>

<main class="container py-5" style="max-width: 640px;">
  <div class="text-center mb-4" data-reveal="hero">
    <h1>Get in touch</h1>
    <p style="color:#6b5a58;">Questions about an order, a product, or a partnership — we read everything.</p>
  </div>

  <div class="filter-panel mb-4" data-reveal="hero">
    <div class="row g-3 text-center">
      <div class="col-md-6">
        <div class="mono" style="font-size:0.75rem; color:#6b5a58;">EMAIL</div>
        <div>hello@shopxtra.pk</div>
      </div>
      <div class="col-md-6">
        <div class="mono" style="font-size:0.75rem; color:#6b5a58;">PHONE</div>
        <div>+92 300 1234567</div>
      </div>
    </div>
  </div>

  <form id="contact-form" class="filter-panel" data-reveal="hero">
    <div class="mb-3">
      <label class="form-label" for="contact-name">Name</label>
      <input type="text" class="form-control" id="contact-name" required>
    </div>
    <div class="mb-3">
      <label class="form-label" for="contact-email">Email</label>
      <input type="email" class="form-control" id="contact-email" required>
    </div>
    <div class="mb-3">
      <label class="form-label" for="contact-message">Message</label>
      <textarea class="form-control" id="contact-message" rows="4" required></textarea>
    </div>
    <button type="submit" class="btn btn-plum w-100">Send message</button>
    <p id="contact-success" class="mt-3 mb-0 text-center d-none" role="status" style="color: var(--gold);">
      Thanks — we'll get back to you soon.
    </p>
  </form>
</main>

<div id="footer-slot"></div>

<script src="/js/vendor/bootstrap.bundle.min.js"></script>
<script src="/js/api.js"></script>
<script src="/js/layout.js"></script>
<script src="/js/search.js"></script>
<script src="/js/cart.js"></script>
<script src="/js/motion.js"></script>
<script>
  document.getElementById('contact-form').addEventListener('submit', (e) => {
    e.preventDefault();
    document.getElementById('contact-success').classList.remove('d-none');
    e.target.reset();
  });
</script>
