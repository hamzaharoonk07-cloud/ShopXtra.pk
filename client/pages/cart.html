  <div class="row g-4">
    <div class="col-lg-8">
      <div id="cart-items"></div>
    </div>
    <div class="col-lg-4">
      <div class="filter-panel">

          <span>Subtotal</span>
          <span class="price" id="cart-subtotal">Rs 0</span>

        <p class="mb-3" style="color:#6b5a58; font-size: 0.9rem;">Shipping and COD fees calculated at checkout.</p>
        <a href="/pages/checkout.html" class="btn btn-plum w-100" id="checkout-btn">Checkout — Cash on Delivery</a>

    </div>
  </div>
