<title>Track Order — ShopXtra</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="icon" type="image/png" href="/assets/favicon.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,200..800&family=Lalezar&family=Instrument+Sans:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<link href="/css/vendor/bootstrap.min.css" rel="stylesheet">
<link href="/css/style.css" rel="stylesheet">

<div id="navbar-slot"></div>

<main class="container py-5" style="max-width: 640px;">
  <div class="text-center mb-4">
    <h1>Track your order</h1>
    <p style="color:#6b5a58;">Enter your order ID and the phone number used at checkout.</p>
  </div>

  <form id="track-form" class="track-form-row">
    <input type="text" class="track-pill-input" id="track-order-id" placeholder="Order ID e.g. SX-6" required>
    <input type="tel" class="track-pill-input" id="track-phone" placeholder="0300 1234567" required>
    <button type="submit" class="btn btn-plum">Track</button>
  </form>
  <p class="text-danger d-none mb-3 text-center" id="track-error"></p>

  <div id="track-result" class="mt-4"></div>
</main>

<div id="footer-slot"></div>
